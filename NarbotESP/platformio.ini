[platformio]
default_envs = main_esp

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

; Upload examples:
;   pio run -e main_esp -t upload
;   pio run -e front_esp -t upload
;   pio device monitor

[env:main_esp]
build_flags =
  ${env.build_flags}
  -D MAIN_ESP

[env:front_esp]
build_flags =
  ${env.build_flags}
  -D FRONT_ESP
